name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/applypilot/scoring/eval_harness.py src/applypilot/scoring/eval_dataset.py tests/test_ai_regression_eval.py tests/test_ai_eval_dataset.py scripts/ai_regression_eval.py scripts/ai_eval_dataset.py

      - name: Test
        run: pytest tests/ -v

      - name: AI regression eval (strict)
        if: matrix.python-version == '3.12'
        run: python scripts/ai_regression_eval.py --strict

      - name: AI formal eval dataset (strict)
        if: matrix.python-version == '3.12'
        run: python scripts/ai_eval_dataset.py --strict

  package-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: pip install build

      - name: Build package
        run: python -m build
