  - "NHS Jobs"
  - "Jobs Go Public"
  - "LG Jobs"
  - "HealthJobsUK"
  - "MoJ Jobs"

defaults:
  results_per_site: 75
  hours_old: 168

resume_routing:
  variants:
    it_support_analyst: "resume_variants/it_support_analyst.txt"
    application_support_engineer: "resume_variants/application_support_engineer.txt"
    technical_systems_analyst: "resume_variants/technical_systems_analyst.txt"
    public_sector_main: "resume_variants/public_sector_main.txt"
    commercial_main: "resume_variants/commercial_main.txt"
    public_it_support: "resume_variants/public_it_support.txt"
    public_application_support: "resume_variants/public_application_support.txt"
    commercial_technical_support: "resume_variants/commercial_technical_support.txt"
  families:
    - name: "it_support_analyst"
      variant: "it_support_analyst"
      keywords: ["it support analyst", "service desk analyst", "helpdesk", "help desk", "desktop support", "1st line support", "first line support", "2nd line support", "second line support", "end user support", "it support technician", "microsoft 365", "active directory"]
    - name: "application_support_engineer"
      variant: "application_support_engineer"
      keywords: ["application support engineer", "application support analyst", "production support", "software support", "technical application support", "business application support", "application analyst", "platform support", "incident management", "sql", "erp", "release support", "application monitoring"]
    - name: "technical_systems_analyst"
      variant: "technical_systems_analyst"
      keywords: ["technical support engineer", "technical support specialist", "support engineer", "customer support engineer", "product support engineer", "technical systems analyst", "systems support analyst", "system support analyst", "business systems support analyst", "systems operations analyst", "technology support analyst", "system analyst", "systems administrator", "systems configuration", "system configuration", "system integration", "integration support", "saas support", "cloud support", "infrastructure support", "implementation support", "api support", "api", "technical troubleshooting", "troubleshooting", "root cause analysis", "issue resolution", "l2 support", "l3 support", "workflow", "process improvement", "requirement gathering", "stakeholder management", "operational support", "service improvement"]
  context_families:
    - name: "public_sector_main"
      variant: "public_sector_main"
      keywords: ["nhs", "nhs jobs", "healthjobsuk", "trust", "foundation trust", "university", "council", "borough council", "city council", "county council", "local authority", "jobs go public", "lg jobs", "civil service", "ministry of justice", "moj jobs", "department for", "public sector"]
    - name: "commercial_main"
      variant: "commercial_main"
      keywords: ["saas", "software company", "product", "platform", "customer", "client", "commercial", "private sector", "startup", "scale-up", "b2b", "b2c", "e-commerce", "fintech"]
  context_routing:
    enabled: true
    override_on_strong_match: true
    min_hits: 2
    min_margin_vs_role: 1
  blended_routes:
    enabled: true
    combos:
      - role_variant: "it_support_analyst"
        context_variant: "public_sector_main"
        variant: "public_it_support"
      - role_variant: "application_support_engineer"
        context_variant: "public_sector_main"
        variant: "public_application_support"
      - role_variant: "technical_systems_analyst"
        context_variant: "commercial_main"
        variant: "commercial_technical_support"

workday_max_tier: 2
workday_location_filter: true

exclude_titles:
  - "senior"
  - "snr"
  - "sr "
  - "lead"
  - "principal"
  - "staff"
  - "head of"
  - "director"
  - "vp"
