# ApplyPilot search configuration (UK) — Data Analyst + Analytics Engineer
#
# Use with a dedicated workspace:
#   PowerShell: $env:APPLYPILOT_DIR="$HOME\.applypilot-data"
#   Then copy this file to:  $env:APPLYPILOT_DIR\searches.yaml
#
# Notes:
# - Queries are biased toward DA/BI/Reporting and "Analytics Engineer".
# - "Data Engineer" is included but junior/ETL-leaning only.

queries:
  # Tier 1 — highest precision
  - query: "Data Analyst"
    tier: 1
  - query: "BI Analyst"
    tier: 1
  - query: "Power BI Analyst"
    tier: 1
  - query: "Reporting Analyst"
    tier: 1
  - query: "Analytics Engineer"
    tier: 1

  # Tier 2 — strong matches, slightly broader
  - query: "SQL Analyst"
    tier: 2
  - query: "MI Analyst"
    tier: 2
  - query: "Business Intelligence"
    tier: 2
  - query: "Data Quality Analyst"
    tier: 2
  - query: "Junior Data Engineer"
    tier: 2
  - query: "ETL Developer"
    tier: 2
  - query: "SQL Developer"
    tier: 2

  # Tier 3 — wider net
  - query: "Insights Analyst"
    tier: 3
  - query: "Performance Analyst"
    tier: 3
  - query: "KPI Analyst"
    tier: 3

locations:
  - location: "London, UK"
    remote: false
  - location: "Manchester, UK"
    remote: false
  - location: "Birmingham, UK"
    remote: false
  - location: "Leeds, UK"
    remote: false
  - location: "Bristol, UK"
    remote: false
  - location: "Edinburgh, UK"
    remote: false
  - location: "Glasgow, UK"
    remote: false
  - location: "Remote"
    remote: true

# Location filtering (applies to both JobSpy and Workday discovery)
location:
  # Accept: UK + common UK cities + remote
  accept_patterns:
    - "United Kingdom"
    - "UK"
    - "England"
    - "Scotland"
    - "Wales"
    - "Northern Ireland"
    - "London"
    - "Manchester"
    - "Birmingham"
    - "Leeds"
    - "Liverpool"
    - "Bristol"
    - "Sheffield"
    - "Nottingham"
    - "Newcastle"
    - "Leicester"
    - "Glasgow"
    - "Edinburgh"
    - "Cardiff"
    - "Belfast"
    - "Remote"
    - "Work from home"
    - "WFH"

  # Reject: obvious non-UK onsite-only signals
  reject_patterns:
    - "United States"
    - "USA"
    - "U.S."
    - "Canada"
    - "India"
    - "Philippines"
    - "Nigeria"
    - "Ghana"
    - "Pakistan"
    - "Kenya"
    - "South Africa"
    - "Onsite only"
    - "On-site only"
    - "in office only"

# JobSpy country setting (Indeed in particular)
country: "UK"

# Boards (JobSpy sources)
boards:
  - indeed
  - linkedin
  - glassdoor
  - google
  - zip_recruiter

defaults:
  results_per_site: 75
  hours_old: 168

# Workday discovery settings
workday_max_tier: 2
workday_location_filter: true

# Negative title filter (case-insensitive substring match)
exclude_titles:
  - "senior"
  - "snr"
  - "sr "
  - "lead"
  - "principal"
  - "staff"
  - "head of"
  - "director"
  - "vp"
  - "vice president"
  - "manager"
  - "chief"
  - "architect"
  - "intern"
  - "internship"
  - "graduate"
  - "phd"
  - "security clearance"
  - "DV clearance"
  - "SC clearance"
  - "TPM"
  - "product manager"
  - "sales"

# Titles to skip during apply (case-insensitive substring match).
# This is evaluated by the apply engines before they lock/start a job.
skip_titles:
  - "bi engineer (mid-level)"
